<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Yusop{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
    @import url('https://fonts.googleapis.com/css2?family=National+Park:wght@200..800&family=Playpen+Sans:wght@100..800&family=Poetsen+One&display=swap');

    /* LOGO */
    #logo{
      font-family: "Playpen Sans", sans-serif;
      font-weight: 700;
      font-style: normal;
    }

    /* TITULOS */
    h1{
      font-family: "Poetsen One", sans-serif;
      font-weight: 400;
      font-style: normal;
      color: var(--primary-color);
    }

    /* FUENTE GLOBAL */
    *{
      font-family: "National Park", sans-serif;
      font-weight: 400;
      font-style: normal;
    }

    /* VARIABLES */
    :root {
      --primary-color: #5b95c8;
      --secondary-color: #3aa091;
    }

    /* BODY */
    body {
      background-color: #ffffff;
    }

    /* NAVBAR */
    .navbar,
    .dropdown-item {
      background-color: var(--primary-color) !important;
    }

    .navbar-brand,
    .nav-link,
    .dropdown-item,
    button {
      color: #ffffff !important;
    }

    /* BOTONES */
    button {
      background-color: #69B550 !important;
      border: none;
    }

    /* SPAN */
    span {
      color: #F5AF40 !important;
    }

    /* CARDS */
    .card-producto,
    .card-tienda {
      transition: transform 0.2s;
    }
    #precio {
      font-size: 1.2rem;
      font-weight: 700;
      color: #F5AF40 !important;
    }
    #botonSecun {
      background-color: #69B550 !important;
      
    }
     .card-producto:hover,

    .card-producto:hover,
    .card-tienda:hover {
      transform: scale(1.02);
    }

    /* FOOTER */
    footer {
      background-color: var(--primary-color);
      color: white;
      padding: 1rem 0;
      text-align: center;
    }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    {% if user.is_authenticated %}
        {% include 'navbar_logged.html' %}
    {% else %}
        {% include 'navbar_guest.html' %}
    {% endif %}

    <!-- CONTENT -->
    {% block content %}{% endblock %}

    <!-- FOOTER -->
    <footer >
        <p>© 2025 Yusop — Hecho con ❤️ para los comercios locales</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}
    {% endblock %}

</body>

</html>
