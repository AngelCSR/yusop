<div class="modal fade" id="modalEliminar{{ tienda.id }}" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content shadow border-0">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title fw-bold">¿Confirmar cierre?</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-start p-4">
                <p class="mb-1 text-dark fw-bold h6">Vas a cerrar la tienda: <span class="text-danger">"{{ tienda.nombre_tienda }}"</span></p>
                <p class="text-muted small mb-0">Esta acción ocultará la tienda y todos sus productos del catálogo público.</p>
            </div>
            <div class="modal-footer bg-light border-top-0">
                <button type="button" class="btn btn-sm btn-secondary px-3" data-bs-dismiss="modal">Cancelar</button>
                <a href="{% url 'desactivar_tienda' tienda.id %}" class="btn btn-sm btn-danger px-4 fw-bold">
                    Sí, cerrar tienda
                </a>
            </div>
        </div>
    </div>
</div>
