{% extends "base.html" %}
{% block title %}Borrar Producto - Yusop{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card mt-5 p-4 shadow text-center">
        <h3 class="text-danger mb-4">Eliminar Producto</h3>
        <p class="lead">¿Estás seguro de que deseas eliminar el producto <strong>{{ producto.nombre_producto }}</strong>?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger w-100">Sí, eliminar</button>
          <a href="{% url 'productos' %}" class="btn btn-secondary w-100 mt-2">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
