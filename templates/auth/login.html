{% extends "base.html" %}
{% load static %} {% block title %}Iniciar Sesión - Yusop{% endblock %}

{% block content %}

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card shadow-sm border-0 p-4 bg-light">
                <div class="text-center mb-4">
                    <img src="{% static 'img/favicon.ico' %}" alt="Yusop" style="width: 70px; height: 70px; object-fit: contain;" class="mx-auto d-block">
                    <h3 class="fw-bold text-success mt-3">¡Hola de nuevo!</h3>
                    <p class="text-muted">Inicia sesión para continuar</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    
                    <button type="submit" class="btn btn-custom-success w-100 py-2 fw-bold mt-3 shadow-sm">
                        Entrar a Yusop
                    </button>
                </form>
                
                <hr class="my-4">
                <div class="text-center">
                    <small class="text-muted">¿No tienes cuenta? 
                        <a href="{% url 'registro' %}" class="text-success fw-bold text-decoration-none">Regístrate aquí</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
